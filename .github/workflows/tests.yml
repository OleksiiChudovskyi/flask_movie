name: Movie Flask Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-build:
    runs-on: ubuntu-latest

    env:
      FLASK_ENV: testing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.13'

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv install --dev

      - name: Run style checks (flake8)
        run: pipenv run flake8 src/ --ignore=E722,E501,E402,F401

      - name: Run tests
        run: pipenv run python -m pytest tests/

      - name: Run coverage report
        run: pipenv run coverage report -m