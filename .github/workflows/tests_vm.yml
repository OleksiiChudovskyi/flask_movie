name: Movie Flask Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-build:
    runs-on: ubuntu-latest

    env:
      FLASK_ENV: testing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.15'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.2  # Можна вказати потрібну або останню версію
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      # Кешування залежностей Poetry для прискорення наступних запусків CI
      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}

      # Встановлюємо залежності лише якщо лок-файл змінився (немає в кеші)
      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-root

      - name: Run style checks (flake8)
        run: poetry run flake8 src/ --ignore=E722,E501,E402,F401

      - name: Run tests with coverage
        run: poetry run pytest --cov=src --cov-report=term
