services:

  api:
    build:
      context: ./
      dockerfile: docker/Dockerfile.prod
    image: flask_movie_prod:6.0.0
    container_name: fm_api
    command: gunicorn wsgi:app --bind 0.0.0.0:8001 --workers 4 --timeout 90 --access-logfile '-'
    ports:
      - 5001:8001
    restart: unless-stopped #no, always, on-failure: 5, unless-stopped
    environment:
      - FLASK_ENV=${FLASK_ENV}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
    secrets:
      - flask_secret_key
      - pg_password
    depends_on:
      - db

  db:
    image: postgres:14-bookworm
    container_name: fm_db
    volumes:
      - pg_data:/var/lib/postgresql/data/
    restart: unless-stopped #no, always, on-failure: 5, unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD_FILE=/run/secrets/pg_password
    secrets:
      - pg_password

  adminer:
    image: adminer
    container_name: adminer
    ports:
      - 8080:8080
    depends_on:
      - db

volumes:
  pg_data:

secrets:
  flask_secret_key:
    file: sets/secrets/secret_key.txt
  pg_password:
    file: sets/secrets/pg_secrets.txt