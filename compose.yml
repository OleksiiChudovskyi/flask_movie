services:

  api:
    build:
      context: ./
      dockerfile: Dockerfile
    image: flask_movie_prod:6.0.0
    container_name: fm_api
    command: gunicorn wsgi:app --bind 0.0.0.0:8001 --access-logfile '-'
    ports:
      - 5001:8001
    restart: unless-stopped #no, always, on-failure: 5, unless-stopped
    environment:
      - POSTGRES_DB=fm
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=qwerty
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      - db

  db:
    image: postgres:14-bookworm
    container_name: fm_db
    volumes:
      - pg_data:/var/lib/postgresql/data/
    restart: unless-stopped #no, always, on-failure: 5, unless-stopped
    environment:
      - POSTGRES_DB=fm
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=qwerty

  adminer:
    image: adminer
    container_name: adminer
    ports:
      - 8080:8080
    depends_on:
      - db

volumes:
  pg_data: